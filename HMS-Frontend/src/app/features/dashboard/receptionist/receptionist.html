<app-dashboard-layout [menuItems]="sidebarItems" title="HMS" subtitle="Reception" pageTitle="Dashboard">
  <!-- Stats -->
  <div class="stats-grid">
    <button type="button" class="stat-card stat-accent" (click)="navigateTo('/receptionist/appointments/today')">
      <span class="stat-content">
        <span class="stat-value">{{ todayAppointments.length }}</span>
        <span class="stat-label">Today's Appointments</span>
      </span>
    </button>
    <button type="button" class="stat-card stat-primary" (click)="navigateTo('/receptionist/appointments/today')">
      <span class="stat-content">
        <span class="stat-value">{{ totalBookedToday }}</span>
        <span class="stat-label">Pending Today</span>
      </span>
    </button>
    <button type="button" class="stat-card stat-info" (click)="navigateTo('/receptionist/patients')">
      <span class="stat-content">
        <span class="stat-value">{{ totalPatients }}</span>
        <span class="stat-label">Total Patients</span>
      </span>
    </button>
  </div>

  <!-- Quick Actions -->
  <div class="section-header">
    <h2>Quick Actions</h2>
  </div>
  <div class="actions-grid">
    <button type="button" class="action-card" (click)="navigateTo('/receptionist/book-appointment')">
      <span class="action-label">Book Appointment</span>
    </button>
    <button type="button" class="action-card" (click)="navigateTo('/receptionist/patients/create')">
      <span class="action-label">Register Patient</span>
    </button>
    <button type="button" class="action-card" (click)="navigateTo('/receptionist/patients/search')">
      <span class="action-label">Search Patient</span>
    </button>
  </div>

  <!-- Today's Appointments Preview -->
  @if (todayAppointments.length > 0) {
  <div class="section-header">
    <h2>Today's Appointments</h2>
    <button type="button" (click)="navigateTo('/receptionist/appointments/today')" class="btn btn-secondary btn-sm">View
      All</button>
  </div>
  <div class="card">
    <div class="table-container">
      <table class="data-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Patient</th>
            <th>Doctor</th>
            <th>Time</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          @for (apt of todayAppointments.slice(0, 5); track apt._id) {
          <tr>
            <td><span class="code-badge">{{ apt.appointmentId }}</span></td>
            <td>{{ apt.patientId?.name }}</td>
            <td>Dr. {{ apt.doctorEmployeeId?.name }}</td>
            <td><span class="time-badge">{{ apt.timeSlot }}</span></td>
            <td><span [class]="'status-badge status-' + apt.status.toLowerCase()">{{ apt.status }}</span></td>
          </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
  }
</app-dashboard-layout>
